apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 10m

  chart:
    spec:
      chart: loki
      version: "17.1.6"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: loki-values
