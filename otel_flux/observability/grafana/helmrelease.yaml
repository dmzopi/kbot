apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 10m

  chart:
    spec:
      chart: grafana
      version: "10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    grafana.ini:
      server:
        domain: grafana.rocky-vm.home
        root_url: https://grafana.rocky-vm.home
        serve_from_sub_path: false

    ingress:
      enabled: false

    persistence:
      enabled: true
      size: 10Gi

    service:
      type: ClusterIP
      port: 80

    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
        watchMethod: WATCH

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:

          - name: Prometheus
            type: prometheus
            uid: prometheus
            access: proxy
            isDefault: false
            url: http://prometheus-server.monitoring.svc.cluster.local
            jsonData:
              httpMethod: GET

          - name: Loki
            type: loki
            uid: loki
            access: proxy
            url: http://loki-gateway.monitoring.svc.cluster.local
            jsonData:
              httpHeaderName1: X-Scope-OrgID
              derivedFields:
                - name: TraceID
                  matcherRegex: 'trace_id":"([a-f0-9]+)'
                  url: "${__value.raw}"
                  datasourceUid: tempo
            secureJsonData:
              httpHeaderValue1: foo

          - name: Tempo
            type: tempo
            uid: tempo
            access: proxy
            isDefault: true
            url: http://tempo.monitoring.svc.cluster.local:3200
            jsonData:
              httpMethod: GET
              tracesToLogsV2:
                datasourceUid: loki
