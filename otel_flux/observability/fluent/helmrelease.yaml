apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
  namespace: monitoring
spec:
  interval: 10m

  chart:
    spec:
      chart: fluent-bit
      version: "0.57.6"
      sourceRef:
        kind: HelmRepository
        name: fluent
        namespace: flux-system

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  valuesFrom:
    - kind: ConfigMap
      name: fluent-bit-values
