apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: otel-collector
  namespace: flux-system
spec:
  path: ./clusters/k3d-kbot/observability/otel/collector
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 10m
  prune: true

  dependsOn:
    - name: otel-operator
