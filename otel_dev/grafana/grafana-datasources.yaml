
apiVersion: 1

datasources:
- name: Prometheus
  type: prometheus
  uid: prometheus
  orgId: 1
  url: http://prometheus:9090
  basicAuth: false
  isDefault: false
  version: 1
  editable: true
  jsonData:
    httpMethod: GET

- name: Loki
  type: loki
  access: proxy 
  orgId: 1
  url: http://loki:3100
  basicAuth: false
  isDefault: false
  version: 1
  editable: true

- name: Tempo
  type: tempo
  access: proxy
  url: http://tempo:3200
  isDefault: true
  jsonData:
    httpMethod: GET
    tracesToLogsV2:
      datasourceUid: loki
      tags: ["service.name", "trace_id"]
      filterByTraceID: true
      filterBySpanID: false