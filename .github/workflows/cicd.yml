# github actions pipeline

name: KBOT-CICD

# Allow github actions to commit code
permissions:
  contents: write

# Event that triggers this job 
on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI
    #Run on github hosted ubuntu 
    runs-on: ubuntu-latest
    #Run on self-hosted runner
    #runs-on: self-hosted

    steps:
      # Fetch the repo code from runner
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # we need all history for bracnhes and tags because we use it for versioning in Makefile
      - name: Run test
        run: make test
      
      - name: Docker hub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Build&Push
        env:
          APP: "kbot"
          REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}
        run: make print-env image push
    
  cd:
    name: CD
    needs: ci #starts only if ci job finished well
    runs-on: ubuntu-latest

    steps:
    
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    # Pass VERSION to HITHUBENV, so shared with other steps
    - run: echo "VERSION=$(git describe --tags --abbrev=0)-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
    # Set current image TAG in helm chart 
    - name: Update Helm chart
      uses: mikefarah/yq@master
      with:
        cmd: yq -i '.image.tag=strenv(VERSION)' helm/values.yaml
    
    - name: Commit Helm chart changes
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git commit -am "chore: update version to $VERSION"
        git push
    
    - name: Checkout FluxCD repo
      uses: actions/checkout@v4
    - name: Clone Flux repo
      run: |
        git clone https://x-access-token:${{ secrets.FLUX_REPO_TOKEN }}@github.com/dmzopi/fluxcd-eks.git flux-repo
    
    - name: Generate Kubernetes secret
      run: |
        cat <<EOF > fluxcd-eks/clusters/k8s-flux-eks/kbot-secret.yaml
        apiVersion: v1
        kind: Secret
        metadata:
          name: kbot-secret
          namespace: demo
        type: Opaque
        stringData:
          token: "${{ secrets.TELE_TOKEN }}"
        EOF
    - name: Install SOPS
      run: |
        curl -LO https://github.com/getsops/sops/releases/latest/download/sops-v3.9.4.linux.amd64
        sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
        sudo chmod +x /usr/local/bin/sops

    - name: Encrypt secret with SOPS
      run: |
        # sops -e --kms "${{ secrets.KMS_KEY }}" --encrypted-regex '^(token)$' fluxcd-eks/clusters/k8s-flux-eks/kbot-secret.yaml > fluxcd-eks/clusters/k8s-flux-eks/kbot-secret-cyph.yaml

    - name: Commit to Flux repo
      run: |
        cd fluxcd-eks

        git config user.name github-actions
        git config user.email github-actions@github.com

        git add clusters/k8s-flux-eks/kbot/kbot-secret-enc.yaml

        git commit -m "add kbot secret cyphered" || echo "no changes"
        git push

      
