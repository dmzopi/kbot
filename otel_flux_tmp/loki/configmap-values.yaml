apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-values
  namespace: monitoring
data:
  values.yaml: |
    deploymentMode: Monolithic

    singleBinary:
      replicas: 1

    backend: { replicas: 0 }
    read: { replicas: 0 }
    write: { replicas: 0 }
    ingester: { replicas: 0 }
    distributor: { replicas: 0 }
    querier: { replicas: 0 }
    queryFrontend: { replicas: 0 }
    queryScheduler: { replicas: 0 }
    compactor: { replicas: 0 }
    indexGateway: { replicas: 0 }
    bloomBuilder: { replicas: 0 }
    bloomGateway: { replicas: 0 }
    bloomPlanner: { replicas: 0 }

    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    minio:
      enabled: false

    loki:
      commonConfig:
        replication_factor: 1

      ignoreMinioDeprecation: true

      limits_config:
        allow_structured_metadata: true
        volume_enabled: true

      pattern_ingester:
        enabled: true

      ruler:
        enable_api: true

      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      storage:
        type: filesystem