apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      version: "10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    grafana.ini:
      server:
        domain: grafana.rocky-vm.home
        root_url: https://grafana.rocky-vm.home
        serve_from_sub_path: false

    ingress:
      enabled: false

    persistence:
      enabled: true
      size: 10Gi

    service:
      type: ClusterIP
      port: 80