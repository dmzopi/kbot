tempo:
  repository: grafana/tempo
  tag: 2.9.0

multitenancyEnabled: false

tempoConfig:
  auth_enabled: false

  server:
    http_listen_port: 3200

  distributor:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}

  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m

  compactor:
    compaction:
      block_retention: 1h

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces