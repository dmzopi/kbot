affinity: {}
annotations: {}
args:
- --workdir=/fluent-bit/etc
- --config=/fluent-bit/etc/conf/fluent-bit.conf
autoscaling:
  behavior: {}
  customRules: []
  enabled: false
  maxReplicas: 3
  minReplicas: 1
  targetCPUUtilizationPercentage: 75
  vpa:
    annotations: {}
    controlledResources: []
    controlledValues: null
    enabled: false
    maxAllowed: {}
    minAllowed: {}
    recommender: default
    updatePolicy:
      updateMode: Auto
command:
- /fluent-bit/bin/fluent-bit
config:
  customParsers: "[PARSER]\n    Name docker_no_time\n    Format json\n    Time_Keep
    Off\n    Time_Key time\n    Time_Format %Y-%m-%dT%H:%M:%S.%L\n[PARSER]\n    Name
    \       app_json_parser\n    Format      json\n    Time_Key    time\n    Time_Format
    %Y-%m-%dT%H:%M:%S.%LZ\n    Time_Keep   On\n\n[PARSER]\n    Name        app_json_parser_no_ms\n
    \   Format      json\n    Time_Key    time\n    Time_Format %Y-%m-%dT%H:%M:%SZ\n
    \   Time_Keep   On\n    \n"
  extraFiles: {}
  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

    [FILTER]
        Name         parser
        Match        kube.*
        Key_Name     log
        Parser       app_json_parser
        Parser       app_json_parser_no_ms
        Reserve_Data True
  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
  outputs: |
    [OUTPUT]
        Name loki
        Match kube.*
        Host loki-gateway.default.svc.cluster.local
        Port 80
        URI /loki/api/v1/push
        tenant_id foo
        labels job=fluentbit,namespace=$kubernetes['namespace_name'],pod=$kubernetes['pod_name'],container=$kubernetes['container_name']
  service: |
    [SERVICE]
        Daemon Off
        Flush {{ .Values.flush }}
        Log_Level {{ .Values.logLevel }}
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port {{ .Values.metricsPort }}
        Health_Check On
  upstream: {}
daemonSetVolumeMounts:
- mountPath: /var/log
  name: varlog
- mountPath: /var/lib/docker/containers
  name: varlibdockercontainers
  readOnly: true
- mountPath: /etc/machine-id
  name: etcmachineid
  readOnly: true
daemonSetVolumes:
- hostPath:
    path: /var/log
  name: varlog
- hostPath:
    path: /var/lib/docker/containers
  name: varlibdockercontainers
- hostPath:
    path: /etc/machine-id
    type: FileOrCreate
  name: etcmachineid
dashboards:
  annotations: {}
  deterministicUid: false
  enabled: false
  labelKey: grafana_dashboard
  labelValue: 1
  namespace: ""
dnsConfig: {}
dnsPolicy: ClusterFirst
env: []
envFrom: []
envWithTpl: []
existingConfigMap: ""
extraContainers: []
extraPorts: []
extraVolumeMounts: []
extraVolumes: []
flush: 1
fullnameOverride: ""
hostAliases: []
hostNetwork: false
hotReload:
  enabled: false
  extraWatchVolumes: []
  image:
    digest: null
    pullPolicy: IfNotPresent
    repository: ghcr.io/jimmidyson/configmap-reload
    tag: v0.15.0
  resources: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    privileged: false
    readOnlyRootFilesystem: true
    runAsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532
image:
  digest: null
  pullPolicy: IfNotPresent
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: null
imagePullSecrets: []
ingress:
  annotations: {}
  enabled: false
  extraHosts: []
  hosts: []
  ingressClassName: ""
  tls: []
initContainers: []
kind: DaemonSet
labels: {}
lifecycle: {}
livenessProbe:
  httpGet:
    path: /
    port: http
logLevel: info
luaScripts: {}
metricsPort: 2020
minReadySeconds: null
nameOverride: ""
networkPolicy:
  enabled: false
nodeSelector: {}
podAnnotations: {}
podDisruptionBudget:
  annotations: {}
  enabled: false
  maxUnavailable: 30%
podLabels: {}
podSecurityContext: {}
podSecurityPolicy:
  annotations: {}
  create: false
  runAsUser:
    rule: RunAsAny
  seLinux:
    rule: RunAsAny
priorityClassName: ""
prometheusRule:
  enabled: false
rbac:
  create: true
  eventsAccess: false
  nodeAccess: false
readinessProbe:
  httpGet:
    path: /api/v2/health
    port: http
replicaCount: 1
resources: {}
securityContext: {}
service:
  annotations: {}
  externalIPs: []
  internalTrafficPolicy: null
  labels: {}
  loadBalancerClass: null
  loadBalancerIP: null
  loadBalancerSourceRanges: []
  port: 2020
  type: ClusterIP
serviceAccount:
  annotations: {}
  automountServiceAccountToken: null
  create: true
  name: null
serviceMonitor:
  additionalEndpoints: []
  enabled: false
terminationGracePeriodSeconds: null
testFramework:
  enabled: true
  image:
    digest: null
    pullPolicy: Always
    repository: busybox
    tag: latest
  namespace: null
tolerations: []
updateStrategy: {}
volumeMounts:
- mountPath: /fluent-bit/etc/conf
  name: config
